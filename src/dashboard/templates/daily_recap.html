<!DOCTYPE html>
<html>
<head>
    <title>TBOT Trade Debrief</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Inter', sans-serif;
            background: #0f1115;
            color: #e0e0e0;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 400px;
            background: #161a25;
            border-right: 1px solid #2a2e39;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header { padding: 16px 20px; border-bottom: 1px solid #2a2e39; }
        .sidebar-header h1 { font-size: 16px; margin: 0 0 10px 0; color: #fff; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 14px 16px; }
        .sidebar-footer { padding: 14px 16px; border-top: 1px solid #2a2e39; background: #13161f; }

        /* ── Controls ── */
        .controls { display: flex; gap: 6px; flex-wrap: wrap; }
        select, input[type=date] {
            background: #222631; border: 1px solid #363c4e; color: #e0e0e0;
            padding: 6px 8px; border-radius: 4px; font-size: 13px;
        }
        button {
            cursor: pointer; border: none; border-radius: 4px;
            padding: 7px 14px; font-weight: 600; font-size: 13px;
            transition: background 0.15s;
        }
        .btn-primary { background: #2962ff; color: #fff; }
        .btn-primary:hover { background: #1e4bd6; }
        .btn-nav { background: #2a2e39; color: #ccc; }
        .btn-nav:hover { background: #363c4e; }
        .btn-ai { background: #7c4dff; color: #fff; width: 100%; padding: 11px; margin-top: 8px; font-size: 13px; }
        .btn-ai:hover { background: #651fff; }

        /* ── Period Summary ── */
        .summary-bar {
            display: grid; grid-template-columns: repeat(4,1fr);
            gap: 8px; margin-bottom: 14px;
        }
        .stat-box {
            background: #1e222d; border-radius: 6px; padding: 10px;
            text-align: center; border: 1px solid #2a2e39;
        }
        .stat-box .stat-val { font-size: 18px; font-weight: 700; line-height: 1.2; }
        .stat-box .stat-lbl { font-size: 10px; color: #6d7385; text-transform: uppercase; margin-top: 3px; letter-spacing: 0.4px; }
        .green { color: #00e676; }
        .red   { color: #ff4d4d; }
        .blue  { color: #448aff; }
        .grey  { color: #9e9e9e; }

        /* ── Cards ── */
        .card {
            background: #1e222d; border-radius: 6px; padding: 13px 14px;
            margin-bottom: 12px; border-left: 4px solid #333;
        }
        .card.win  { border-left-color: #00e676; }
        .card.loss { border-left-color: #ff4d4d; }
        .card.open { border-left-color: #448aff; }
        .card h2 {
            font-size: 11px; text-transform: uppercase; color: #6d7385;
            margin: 0 0 8px 0; letter-spacing: 0.5px;
        }

        /* ── Trade header row ── */
        .trade-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 8px;
        }
        .trade-pnl { font-size: 22px; font-weight: 700; }
        .trade-meta { text-align: right; font-size: 12px; color: #888; }

        .badge {
            display: inline-block; padding: 2px 7px; border-radius: 4px;
            font-size: 11px; font-weight: 700; margin-right: 4px; margin-bottom: 3px;
        }
        .badge-green { color: #00e676; background: rgba(0,230,118,0.12); }
        .badge-red   { color: #ff4d4d; background: rgba(255,77,77,0.12); }
        .badge-blue  { color: #448aff; background: rgba(68,138,255,0.12); }
        .badge-grey  { color: #aaa;    background: rgba(150,150,150,0.12); }

        /* ── Price grid ── */
        .price-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 6px; font-size: 12px; margin-bottom: 6px;
        }
        .price-row { display: flex; justify-content: space-between; }
        .price-row .lbl { color: #6d7385; }
        .price-row .val { font-weight: 600; }

        /* ── Timeline ── */
        .timeline { list-style: none; padding: 0; margin: 0; }
        .timeline li {
            padding: 4px 0 4px 14px; border-left: 2px solid #2a2e39;
            margin-bottom: 4px; position: relative; font-size: 12px; color: #b2b5be;
        }
        .timeline li::before {
            content: ''; position: absolute; left: -5px; top: 8px;
            width: 7px; height: 7px; border-radius: 50%; background: #444;
        }
        .time-label { color: #6d7385; font-size: 11px; margin-right: 5px; }

        /* ── Regime card ── */
        .regime-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
        .regime-row .lbl { color: #6d7385; }
        .tf-block { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #2a2e39; }
        .tf-block:last-child { border-bottom: none; }

        /* ── Chart ── */
        .chart-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .chart-header {
            height: 46px; border-bottom: 1px solid #2a2e39; display: flex;
            align-items: center; padding: 0 18px; background: #161a25; flex-shrink: 0;
            justify-content: space-between;
        }
        .chart-header h3 { margin: 0; font-size: 14px; font-weight: 500; color: #ccc; }
        #chart-container { flex: 1; position: relative; width: 100%; min-height: 400px; }
        .chart-loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%); color: #555; font-size: 13px;
        }

        /* ── Nav footer ── */
        .nav-row { display: flex; justify-content: space-between; align-items: center; }
        #trade-counter { color: #888; font-size: 13px; }

        /* ── Modal ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1e222d; padding: 20px; border-radius: 8px;
            width: 80%; max-width: 600px; border: 1px solid #444;
        }
        .modal-content textarea {
            width: 100%; height: 280px; background: #0f1115; color: #e0e0e0;
            border: 1px solid #333; padding: 10px; font-family: monospace;
            font-size: 12px; margin: 10px 0; resize: none;
        }
        .empty-state { text-align: center; color: #555; margin-top: 40px; font-size: 13px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h1>🎬 Trade Debrief</h1>
        <div class="controls">
            <input type="date" id="date-picker">
            <select id="asset-selector">
                <option value="BTC">BTC</option>
                <option value="GOLD">Gold</option>
                <option value="USTEC">USTEC</option>
                <option value="EURUSD">EURUSD</option>
                <option value="GBPUSD">GBPUSD</option>
                <option value="USDJPY">USDJPY</option>
                <option value="USOIL">USOIL</option>
                <option value="GBPAUD">GBPAUD</option>
                <option value="EURJPY">EURJPY</option>
            </select>
            <select id="mode-selector">
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
            </select>
            <button class="btn-primary" onclick="loadData()">Load</button>
        </div>
    </div>

    <div class="sidebar-content">
        <!-- Period summary -->
        <div id="summary-section" style="display:none;">
            <div class="summary-bar">
                <div class="stat-box">
                    <div class="stat-val" id="s-pnl">—</div>
                    <div class="stat-lbl">Total P&amp;L</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="s-wr">—</div>
                    <div class="stat-lbl">Win Rate</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="s-wins" style="color:#00e676">—</div>
                    <div class="stat-lbl">Wins</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="s-losses" style="color:#ff4d4d">—</div>
                    <div class="stat-lbl">Losses</div>
                </div>
            </div>
        </div>

        <!-- MTF Regime card -->
        <div class="card" id="regime-card" style="display:none;">
            <h2>📊 MTF Regime</h2>
            <div id="regime-content"></div>
        </div>

        <!-- Per-trade narrative -->
        <div id="narrative-content">
            <div class="empty-state">Select a date and asset, then click Load.</div>
        </div>
    </div>

    <div class="sidebar-footer">
        <div class="nav-row">
            <button class="btn-nav" onclick="changeTrade(-1)">⏮ Prev</button>
            <span id="trade-counter">0 / 0</span>
            <button class="btn-nav" onclick="changeTrade(1)">Next ⏭</button>
        </div>
        <button class="btn-ai" id="btn-ai-copy" onclick="copyGeminiReport()">
            🤖 Copy Report for AI Analysis
        </button>
    </div>
</div>

<div class="chart-area">
    <div class="chart-header">
        <h3 id="chart-title">No trade selected</h3>
        <span id="chart-duration" style="font-size:12px; color:#888;"></span>
    </div>
    <div id="chart-container">
        <div class="chart-loading">Initializing chart…</div>
    </div>
</div>

<div class="modal-overlay" id="copy-modal">
    <div class="modal-content">
        <h2 style="margin-top:0; font-size:14px;">📋 Manual Copy</h2>
        <p style="font-size:12px;">Clipboard blocked. Select all (Ctrl+A) and copy (Ctrl+C):</p>
        <textarea id="copy-textarea" readonly></textarea>
        <button class="btn-nav" style="float:right;" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    var reportData = null;
    var currentIndex = 0;
    var chart = null;
    var candleSeries = null;
    var chartLibraryLoaded = false;

    // ── Per-asset mock base prices ──
    var ASSET_BASE_PRICES = {
        BTC: 95000, GOLD: 3300, XAU: 3300, USTEC: 19500,
        EURUSD: 1.085, EURJPY: 161.0, USOIL: 65.0, GBPAUD: 2.0,
        GBPUSD: 1.27, USDJPY: 150.0
    };

    // ── Chart library init ──
    function waitForLibrary() {
        return new Promise(function(resolve) {
            if (typeof LightweightCharts !== 'undefined') { chartLibraryLoaded = true; resolve(true); return; }
            var attempts = 0;
            var iv = setInterval(function() {
                attempts++;
                if (typeof LightweightCharts !== 'undefined') {
                    clearInterval(iv); chartLibraryLoaded = true; resolve(true);
                } else if (attempts > 60) { clearInterval(iv); resolve(false); }
            }, 100);
        });
    }

    function initChart() {
        return new Promise(function(resolve) {
            var container = document.getElementById('chart-container');
            if (!chartLibraryLoaded) {
                waitForLibrary().then(function(ok) {
                    if (!ok) { container.innerHTML = '<div class="chart-loading" style="color:#f44">⚠️ Chart library failed to load.</div>'; resolve(false); return; }
                    buildChart(container, resolve);
                });
            } else {
                buildChart(container, resolve);
            }
        });
    }

    function buildChart(container, resolve) {
        container.innerHTML = '';
        var w = container.clientWidth, h = container.clientHeight;
        if (!w || !h) { container.innerHTML = '<div class="chart-loading" style="color:#f44">⚠️ Container sizing error.</div>'; resolve(false); return; }
        try {
            chart = LightweightCharts.createChart(container, {
                width: w, height: h,
                layout: { background: { color: '#0f1115' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#1a1e27' }, horzLines: { color: '#1a1e27' } },
                timeScale: { timeVisible: true, secondsVisible: false, borderColor: '#2a2e39' },
                rightPriceScale: { borderColor: '#2a2e39' }
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#00e676', downColor: '#ff4d4d',
                borderVisible: false, wickUpColor: '#00e676', wickDownColor: '#ff4d4d'
            });
            window.addEventListener('resize', function() {
                if (chart) chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
            });
            resolve(true);
        } catch(e) {
            container.innerHTML = '<div class="chart-loading" style="color:#f44">⚠️ ' + e.message + '</div>';
            resolve(false);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('date-picker').value = new Date().toISOString().split('T')[0];
        waitForLibrary().then(function(ok) {
            if (ok) setTimeout(initChart, 200);
        });
    });

    // ── Load data ──
    function loadData() {
        var date  = document.getElementById('date-picker').value;
        var mode  = document.getElementById('mode-selector').value;
        var asset = document.getElementById('asset-selector').value;
        var content = document.getElementById('narrative-content');

        content.innerHTML = '<div class="empty-state">Loading…</div>';
        document.getElementById('summary-section').style.display = 'none';

        fetch('/api/debrief_data?date=' + date + '&mode=' + mode)
            .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(function(data) {
                if (data.error) throw new Error(data.error);
                reportData = data;
                renderSummary(data);
                if (!data.trades || data.trades.length === 0) {
                    content.innerHTML = '<div class="empty-state">No trades for this period.</div>';
                    document.getElementById('trade-counter').innerText = '0 / 0';
                    document.getElementById('chart-title').innerText = 'No trade selected';
                    if (candleSeries) candleSeries.setData([]);
                } else {
                    currentIndex = 0;
                    renderTrade(0);
                }
            })
            .catch(function(e) {
                content.innerHTML = '<div class="empty-state" style="color:#f44">Error: ' + e.message + '</div>';
            });

        fetchRegimeData(asset, date);
    }

    // ── Period summary bar ──
    function renderSummary(data) {
        var sec = document.getElementById('summary-section');
        if (!data.closed_trades) { sec.style.display = 'none'; return; }
        sec.style.display = 'block';

        var pnl = data.total_pnl || 0;
        var pnlEl = document.getElementById('s-pnl');
        pnlEl.innerText = (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(2);
        pnlEl.className = 'stat-val ' + (pnl >= 0 ? 'green' : 'red');

        var wr = data.win_rate || 0;
        var wrEl = document.getElementById('s-wr');
        wrEl.innerText = wr.toFixed(1) + '%';
        wrEl.className = 'stat-val ' + (wr >= 50 ? 'green' : 'red');

        document.getElementById('s-wins').innerText   = data.wins   || 0;
        document.getElementById('s-losses').innerText = data.losses || 0;
    }

    // ── Render single trade ──
    function renderTrade(index) {
        if (!reportData || !reportData.trades || !reportData.trades[index]) return;
        var t = reportData.trades[index];
        var content = document.getElementById('narrative-content');
        document.getElementById('trade-counter').innerText = (index + 1) + ' / ' + reportData.trades.length;

        var isOpen  = !t.exit_time;
        var isWin   = t.pnl > 0;
        var cardCls = isOpen ? 'open' : (isWin ? 'win' : 'loss');
        var pnlCls  = isOpen ? 'blue' : (isWin ? 'green' : 'red');
        var pnlTxt  = isOpen ? 'OPEN' : ((t.pnl >= 0 ? '+' : '') + '$' + t.pnl.toFixed(2));
        var sideCls = t.side && t.side.toLowerCase() === 'buy' ? 'badge-green' : 'badge-red';

        // Chart title + duration
        var entryFmt = t.entry_time ? t.entry_time.replace('T',' ').slice(0,16) : '—';
        document.getElementById('chart-title').innerText =
            (t.asset || '?') + ' ' + ((t.side||'?').toUpperCase()) + ' @ ' + entryFmt;
        document.getElementById('chart-duration').innerText = isOpen
            ? '🔵 Still open'
            : '⏱ ' + (t.duration || '—');

        // Price grid helpers
        function fmt(v, decimals) {
            if (v === null || v === undefined) return '—';
            return parseFloat(v).toFixed(decimals !== undefined ? decimals : 4);
        }
        // Determine decimal places per asset
        var dec = 2;
        var a = (t.asset||'').toUpperCase();
        if (a === 'EURUSD' || a === 'EURJPY' || a === 'GBPAUD' || a === 'GBPUSD') dec = 5;
        else if (a === 'USDJPY') dec = 3;
        else if (a === 'BTC' || a === 'USTEC' || a === 'USOIL') dec = 2;

        var html = '';

        // ── Card 1: P&L + prices ──
        html += '<div class="card ' + cardCls + '">';
        html +=   '<div class="trade-header">';
        html +=     '<div>';
        html +=       '<div class="trade-pnl ' + pnlCls + '">' + pnlTxt + '</div>';
        if (!isOpen) {
            html +=   '<div style="font-size:12px; color:#888; margin-top:2px;">' + (t.pnl_pct >= 0 ? '+' : '') + t.pnl_pct.toFixed(2) + '%</div>';
        }
        html +=     '</div>';
        html +=     '<div>';
        html +=       '<span class="badge ' + sideCls + '">' + (t.side||'?').toUpperCase() + '</span>';
        if (isOpen) html += '<span class="badge badge-blue">LIVE</span>';
        html +=     '</div>';
        html +=   '</div>';
        html +=   '<div class="price-grid">';
        html +=     '<div class="price-row"><span class="lbl">Entry</span><span class="val">' + fmt(t.entry_price, dec) + '</span></div>';
        html +=     '<div class="price-row"><span class="lbl">Exit</span><span class="val">' + (isOpen ? '—' : fmt(t.exit_price, dec)) + '</span></div>';
        html +=     '<div class="price-row"><span class="lbl">SL</span><span class="val" style="color:#ff6b6b;">' + fmt(t.stop_loss, dec) + '</span></div>';
        html +=     '<div class="price-row"><span class="lbl">TP</span><span class="val" style="color:#69f0ae;">' + fmt(t.take_profit, dec) + '</span></div>';
        html +=   '</div>';
        if (t.lot_size) {
            html += '<div style="font-size:11px; color:#6d7385; margin-top:6px;">Lot size: ' + t.lot_size + ' &nbsp;|&nbsp; Duration: ' + (t.duration||'—') + '</div>';
        }
        html += '</div>';

        // ── Card 2: Strategy Logic ──
        var trigger = t.narrative.trigger || 'No signal reasoning recorded.';
        // Strip raw JSON if it crept in
        if (trigger.startsWith('{') || trigger.startsWith('[')) {
            try { var obj = JSON.parse(trigger); trigger = obj.reasoning || obj.reason || JSON.stringify(obj); } catch(e) {}
        }
        var context = t.narrative.market_context || '';
        html += '<div class="card">';
        html +=   '<h2>🧠 Why This Trade</h2>';
        html +=   '<p style="font-size:13px; margin:0 0 6px 0;">' + trigger + '</p>';
        if (context) {
            html += '<p style="font-size:12px; color:#888; margin:0; font-style:italic;">' + context + '</p>';
        }
        html += '</div>';

        // ── Card 3: AI Validator ──
        var verdict  = t.narrative.ai_verdict  || '';
        var analysis = t.narrative.ai_analysis || '';
        var verdictStyle = '';
        if (verdict.includes('PASSED'))   verdictStyle = 'color:#00e676;';
        if (verdict.includes('BLOCKED'))  verdictStyle = 'color:#ff4d4d;';
        if (verdict.includes('BYPASSED')) verdictStyle = 'color:#ffb300;';
        html += '<div class="card">';
        html +=   '<h2>🤖 AI Validator</h2>';
        if (verdict && verdict !== 'N/A') {
            html += '<div style="font-size:13px; font-weight:700; margin-bottom:6px; ' + verdictStyle + '">' + verdict + '</div>';
            html += '<p style="font-size:12px; margin:0; color:#b2b5be;">' + analysis + '</p>';
        } else {
            html += '<p style="font-size:12px; color:#555; margin:0;">No AI validation data recorded for this trade.</p>';
        }
        html += '</div>';

        // ── Card 4: Trade Timeline ──
        html += '<div class="card">';
        html +=   '<h2>📋 Management Events</h2>';
        html +=   '<ul class="timeline">';
        if (t.timeline && t.timeline.length > 0) {
            for (var i = 0; i < t.timeline.length; i++) {
                var ev = t.timeline[i];
                html += '<li><span class="time-label">' + (ev.time||'') + '</span>';
                html += '<strong>' + (ev.event||'Event') + '</strong>';
                if (ev.detail) html += ' <span style="color:#888;">' + ev.detail + '</span>';
                html += '</li>';
            }
        } else {
            html += '<li style="color:#555;">(No VTM events recorded)</li>';
        }
        html += '</ul></div>';

        content.innerHTML = html;
        loadChartData(t);
    }

    // ── Chart data ──
    function loadChartData(trade) {
        if (!candleSeries) {
            initChart().then(function(ok) { if (ok) loadChartData(trade); });
            return;
        }

        var asset = trade.asset || 'BTC';
        var startParam = trade.chart_data_start ? 'start=' + encodeURIComponent(trade.chart_data_start) : '';
        var endParam   = trade.chart_data_end   ? 'end='   + encodeURIComponent(trade.chart_data_end)   : '';
        var params = [startParam, endParam].filter(Boolean).join('&');
        var url = '/api/history/' + asset + (params ? '?' + params : '');

        fetch(url)
            .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(function(candles) {
                if (!candles || candles.length === 0) candles = generateMockCandles(trade);
                paintChart(trade, candles);
            })
            .catch(function() {
                paintChart(trade, generateMockCandles(trade));
            });
    }

    function paintChart(trade, candles) {
        candleSeries.setData(candles);

        var markers = [];
        if (trade.entry_time) {
            markers.push({
                time: Math.floor(new Date(trade.entry_time).getTime() / 1000),
                position: 'belowBar', color: '#448aff', shape: 'arrowUp',
                text: 'IN ' + ((trade.side||'').toUpperCase()) + (trade.entry_price ? ' @' + parseFloat(trade.entry_price).toFixed(2) : '')
            });
        }
        if (trade.exit_time) {
            var win = (trade.pnl || 0) > 0;
            markers.push({
                time: Math.floor(new Date(trade.exit_time).getTime() / 1000),
                position: 'aboveBar', color: win ? '#00e676' : '#ff4d4d', shape: 'arrowDown',
                text: 'OUT ' + (trade.exit_price ? '@' + parseFloat(trade.exit_price).toFixed(2) : '')
                      + (trade.pnl ? ' (' + (trade.pnl >= 0 ? '+' : '') + '$' + trade.pnl.toFixed(2) + ')' : '')
            });
        }
        if (markers.length > 0) candleSeries.setMarkers(markers);
        chart.timeScale().fitContent();
    }

    function generateMockCandles(trade) {
        var asset = (trade.asset || 'BTC').toUpperCase();
        var basePrice = ASSET_BASE_PRICES[asset] || ASSET_BASE_PRICES['BTC'];
        if (trade.entry_price) basePrice = parseFloat(trade.entry_price);

        var candles = [];
        var entryTs = new Date(trade.entry_time).getTime() / 1000;
        var startTs = entryTs - (6 * 3600);
        var volatility = basePrice * 0.003;

        for (var i = 0; i < 100; i++) {
            var t = startTs + i * 300;
            var dir = Math.random() > 0.5 ? 1 : -1;
            var open  = basePrice + dir * (Math.random() * volatility);
            var close = open + (Math.random() - 0.5) * volatility;
            var high  = Math.max(open, close) + Math.random() * volatility * 0.5;
            var low   = Math.min(open, close) - Math.random() * volatility * 0.5;
            candles.push({ time: t, open: open, high: high, low: low, close: close });
            basePrice = close;
        }
        return candles;
    }

    // ── Navigation ──
    function changeTrade(delta) {
        if (!reportData || !reportData.trades) return;
        var next = currentIndex + delta;
        if (next >= 0 && next < reportData.trades.length) {
            currentIndex = next;
            renderTrade(currentIndex);
        }
    }

    // ── Gemini export ──
    function copyGeminiReport() {
        var date = document.getElementById('date-picker').value;
        var mode = document.getElementById('mode-selector').value;
        var btn  = document.getElementById('btn-ai-copy');
        btn.innerText = '⏳ Generating…'; btn.disabled = true;

        fetch('/api/export_gemini?date=' + date + '&mode=' + mode)
            .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(function(data) {
                if (data.status === 'success') {
                    navigator.clipboard.writeText(data.report).then(function() {
                        btn.innerText = '✅ Copied!';
                    }).catch(function() {
                        showManualCopy(data.report); btn.innerText = '⚠️ Manual Copy';
                    });
                } else { btn.innerText = '❌ Error'; alert(data.message || 'Unknown error'); }
            })
            .catch(function(e) { btn.innerText = '❌ Error'; alert('Failed: ' + e.message); })
            .finally(function() {
                setTimeout(function() { btn.innerText = '🤖 Copy Report for AI Analysis'; btn.disabled = false; }, 2500);
            });
    }

    function showManualCopy(text) {
        var modal = document.getElementById('copy-modal');
        document.getElementById('copy-textarea').value = text;
        modal.style.display = 'flex';
        document.getElementById('copy-textarea').select();
    }
    function closeModal() { document.getElementById('copy-modal').style.display = 'none'; }

    // ── Regime card ──
    function fetchRegimeData(asset, date) {
        var card    = document.getElementById('regime-card');
        var content = document.getElementById('regime-content');
        card.style.display = 'block';
        content.innerHTML = '<div style="font-size:12px; color:#555;">Loading…</div>';

        fetch('/api/regime/' + asset + '?date=' + date)
            .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(function(data) { if (data.error) throw new Error(data.error); renderRegime(data); })
            .catch(function(e) {
                content.innerHTML = '<div style="font-size:12px; color:#f44;">No regime data: ' + e.message + '</div>';
            });
    }

    var REGIME_EMOJI = {
        strong_bull:'🚀', bullish:'📈', slightly_bullish:'↗️',
        neutral:'➡️', slightly_bearish:'↘️', bearish:'📉', strong_bear:'⚠️',
        transition:'🔄', ranging:'↔️'
    };

    function renderRegime(d) {
        var content = document.getElementById('regime-content');
        if (!d || !d.asset) { document.getElementById('regime-card').style.display = 'none'; return; }

        var ts = new Date(d.timestamp).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
        var cReg = (d.consensus.regime || 'unknown').toLowerCase();
        var cEmoji = REGIME_EMOJI[cReg] || '❓';

        function tfRow(tf, label) {
            if (!tf || !tf.regime) return '<div class="tf-block"><b>' + label + '</b> — no data</div>';
            var reg = tf.regime.toLowerCase();
            var e = REGIME_EMOJI[reg] || '❓';
            return '<div class="tf-block">'
                + '<div style="font-size:12px; font-weight:600; margin-bottom:4px;">' + label + ' &nbsp; ' + e + ' ' + tf.regime.toUpperCase() + ' <span style="color:#6d7385; font-weight:400;">(' + (tf.confidence*100).toFixed(0) + '%)</span></div>'
                + '<div class="regime-row"><span class="lbl">ADX</span><span>' + (tf.adx ? tf.adx.toFixed(1) : '—') + '</span></div>'
                + '<div class="regime-row"><span class="lbl">RSI</span><span>' + (tf.rsi ? tf.rsi.toFixed(1) : '—') + '</span></div>'
                + '<div class="regime-row"><span class="lbl">Trend</span><span>' + (tf.trend_direction || '—') + '</span></div>'
                + '</div>';
        }

        var html = '<div style="font-size:11px; color:#6d7385; margin-bottom:8px;">' + ts + ' &nbsp; | &nbsp; ' + d.asset + '</div>';
        html += '<div style="font-size:15px; font-weight:700; margin-bottom:4px;">' + cEmoji + ' ' + (d.consensus.regime||'').toUpperCase() + ' <span style="font-weight:400; font-size:13px; color:#888;">(' + (d.consensus.confidence*100).toFixed(0) + '%)</span></div>';
        html += '<div style="font-size:12px; color:#6d7385; margin-bottom:10px;">Agreement: ' + (d.consensus.timeframe_agreement*100).toFixed(0) + '% &nbsp;|&nbsp; Risk: ' + (d.risk.level||'—') + ' &nbsp;|&nbsp; Vol: ' + (d.risk.volatility||'—') + '</div>';
        html += tfRow(d.timeframes['1h'], '1H');
        html += tfRow(d.timeframes['4h'], '4H');
        html += tfRow(d.timeframes['1d'], '1D');
        html += '<div style="font-size:12px; border-top:1px solid #2a2e39; padding-top:8px; margin-top:4px;">';
        html += '<b>Mode:</b> ' + (d.trading_implications.recommended_mode||'—');
        html += ' &nbsp;|&nbsp; <b>Max pos:</b> ' + (d.trading_implications.suggested_max_positions||'—');
        html += ' &nbsp;|&nbsp; Counter-trend: ' + (d.trading_implications.allow_counter_trend ? '✅' : '❌');
        html += '</div>';

        content.innerHTML = html;
    }
</script>
